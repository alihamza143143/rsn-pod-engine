<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- RSN sheep — bold silhouette, no background, fills the frame -->
  <!-- Woolly body -->
  <ellipse cx="36" cy="32" rx="26" ry="20" fill="#1a1a2e"/>
  <!-- Head -->
  <circle cx="14" cy="25" r="11" fill="#1a1a2e"/>
  <!-- Snout -->
  <circle cx="8" cy="22" r="6" fill="#1a1a2e"/>
  <!-- Eye -->
  <circle cx="10" cy="20" r="2.5" fill="white"/>
  <!-- Ear -->
  <ellipse cx="19" cy="15" rx="4" ry="7" fill="#1a1a2e" transform="rotate(-15 19 15)"/>
  <!-- Front legs -->
  <rect x="18" y="49" width="7" height="13" rx="3" fill="#1a1a2e"/>
  <!-- Back legs -->
  <rect x="42" y="49" width="7" height="13" rx="3" fill="#1a1a2e"/>
</svg>
